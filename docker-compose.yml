version: '3.9'

# ============================================================
# SYNAPSE — Docker Compose (Local Development)
# Usage: docker-compose up -d
# ============================================================

networks:
  synapse_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: synapse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse_db
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: synapse_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - synapse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache & Broker ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: synapse_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - synapse_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: synapse_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synapse_user:synapse_pass@postgres:5432/synapse_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synapse_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI AI Service ──────────────────────────────────
  fastapi_ai:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: synapse_fastapi_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synapse_user:synapse_pass@postgres:5432/synapse_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    volumes:
      - ./ai_engine:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synapse_network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: synapse_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - synapse_network
    command: npm run dev

  # ── Celery Worker ───────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: synapse_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synapse_user:synapse_pass@postgres:5432/synapse_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synapse_network
    command: celery -A config.celery worker --loglevel=info --concurrency=4 -Q default,scraping,nlp,agents

  # ── Celery Beat Scheduler ───────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: synapse_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synapse_user:synapse_pass@postgres:5432/synapse_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synapse_network
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Flower (Celery Monitoring) ──────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: synapse_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_BASIC_AUTH: admin:flower_password
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - synapse_network
    command: celery -A config.celery flower --port=5555

  # ── pgAdmin (optional DB GUI) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: synapse_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@synapse.ai
      PGADMIN_DEFAULT_PASSWORD: pgadmin_password
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - synapse_network
    profiles:
      - tools
