services:
  - type: web
    name: synapse-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    # Build context must be repo root so scraper/ is available
    dockerContext: .
    plan: free
    envVars:
      - key: PYTHONPATH
        value: /app:/app/scraper
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: FRONTEND_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: synapse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: synapse-redis
          property: connectionString

databases:
  - name: synapse-db
    plan: free

  - type: redis
    name: synapse-redis
    plan: free
