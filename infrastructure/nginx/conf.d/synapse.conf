# ============================================================
# SYNAPSE — Virtual host config
# ============================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen      80;
    server_name ${DOMAIN} www.${DOMAIN};
    return 301  https://$host$request_uri;
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen              443 ssl http2;
    server_name         ${DOMAIN} www.${DOMAIN};

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com;
         img-src 'self' data: https:;
         connect-src 'self' wss: https:;
         frame-ancestors 'none';"
        always;

    # ── Django REST API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api burst=20 nodelay;
        limit_conn perip 20;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;
    }

    # ── Auth endpoints — stricter rate limit ──────────────────────────────────
    location /api/v1/auth/ {
        limit_req  zone=auth burst=5 nodelay;
        limit_conn perip 5;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Admin ──────────────────────────────────────────────────────────
    location /admin/ {
        limit_req  zone=auth burst=3 nodelay;

        # Restrict admin to office IPs in production (replace with real CIDRs)
        # allow 203.0.113.0/24;
        # deny  all;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI AI Engine ─────────────────────────────────────────────────────
    location /ai/ {
        limit_req  zone=api burst=10 nodelay;

        # Strip /ai prefix before forwarding
        rewrite ^/ai/(.*)$ /$1 break;

        proxy_pass         http://fastapi_ai;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for streaming responses)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 300s;   # long timeout for AI generation
    }

    # ── Django static files (WhiteNoise handles these, but nginx is faster) ───
    location /static/ {
        alias /app/staticfiles/;
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        gzip_static on;
    }

    # ── User-uploaded media ───────────────────────────────────────────────────
    location /media/ {
        alias      /app/media/;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Next.js frontend ──────────────────────────────────────────────────────
    location / {
        limit_req  zone=general burst=30 nodelay;

        proxy_pass         http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket (Next.js HMR — not needed in prod but harmless)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Next.js static assets — aggressive caching ───────────────────────────
    location /_next/static/ {
        proxy_pass         http://nextjs_frontend;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Flower monitoring (restrict to internal/admin) ────────────────────────
    location /flower/ {
        limit_req  zone=auth burst=5 nodelay;

        proxy_pass         http://flower:5555/;
        proxy_http_version 1.1;
        proxy_set_header   Host     $host;
        proxy_set_header   X-Real-IP $remote_addr;
        rewrite            ^/flower/(.*)$ /$1 break;
    }
}
